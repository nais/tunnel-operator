apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnels.nais.io
spec:
  group: nais.io
  names:
    kind: Tunnel
    listKind: TunnelList
    plural: tunnels
    singular: tunnel
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - teamSlug
            - environment
            - target
            - clientPublicKey
            properties:
              teamSlug:
                type: string
                description: Team that owns this tunnel
              environment:
                type: string
                description: Target environment
              target:
                type: object
                description: Destination info
                required:
                - host
                - port
                - resolvedIP
                properties:
                  host:
                    type: string
                    description: Destination FQDN from Valkey credentials
                  port:
                    type: integer
                    format: int32
                    description: Destination port (e.g., 6379 for Valkey)
                  resolvedIP:
                    type: string
                    description: Pre-resolved IP address of the target
              clientPublicKey:
                type: string
                description: WireGuard public key from the CLI
              activeDeadlineSeconds:
                type: integer
                format: int64
                description: Maximum lifetime of the gateway pod (safety net)
          status:
            type: object
            properties:
              phase:
                type: string
                description: Current lifecycle phase
                enum:
                - Pending
                - Provisioning
                - Ready
                - Connected
                - Failed
                - Terminated
              gatewayPublicKey:
                type: string
                description: Gateway's WireGuard public key
              forwarderPort:
                type: integer
                format: int32
                description: Port exposed by the forwarder
              forwarderEndpoint:
                type: string
                description: Forwarder endpoint advertised to clients
              gatewayPodName:
                type: string
                description: Name of the gateway pod
              message:
                type: string
                description: Human-readable status message
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
                description: Standard Kubernetes conditions
