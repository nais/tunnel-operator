apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tunnel-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tunnel-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tunnel-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tunnel-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tunnel-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: GATEWAY_IMAGE
          value: {{ .Values.gatewayImage | quote }}
        - name: TENANT_DOMAIN
          value: {{ .Values.tenant.domain | quote }}
        - name: CLUSTERS
          value: {{ .Values.clusters | quote }}
        {{- if .Values.staticClusters }}
        - name: STATIC_CLUSTERS
          valueFrom:
            secretKeyRef:
              name: {{ include "tunnel-operator.fullname" . }}
              key: static-clusters
        {{- end }}
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
