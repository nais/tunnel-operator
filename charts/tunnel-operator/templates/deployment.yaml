apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tunnel-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tunnel-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tunnel-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tunnel-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tunnel-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: GATEWAY_IMAGE
          value: {{ .Values.gatewayImage | quote }}
        - name: GRPC_ADDR
          value: ":{{ .Values.grpc.port }}"
        - name: FORWARDER_SERVICE_NAME
          value: {{ include "tunnel-operator.fullname" . }}-forwarder
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: FORWARDER_PORT_RANGE_MIN
          value: {{ .Values.forwarderPortRange.min | quote }}
        - name: FORWARDER_PORT_RANGE_MAX
          value: {{ .Values.forwarderPortRange.max | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.logLevel | default "info" | quote }}
        - name: GATEWAY_DEBUG
          value: {{ .Values.gatewayDebug | default false | quote }}
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.grpc.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
