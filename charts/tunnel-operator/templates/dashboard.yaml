{{- if ((.Values.grafana).dashboard).enabled | default true }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tunnel-operator.fullname" . }}-dashboard
  labels:
    {{- include "tunnel-operator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  tunnel-operator.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "tags": ["nais", "tunnel", "wireguard"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "definition": "label_values(tunnel_operator_tunnels_active, namespace)",
            "name": "namespace",
            "includeAll": true,
            "multi": true,
            "query": { "query": "label_values(tunnel_operator_tunnels_active, namespace)" },
            "refresh": 2,
            "type": "query"
          },
          {
            "current": {},
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Tunnel Operator",
      "uid": "tunnel-operator",
      "panels": [
        {
          "title": "Operator",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Active Tunnels",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(tunnel_operator_tunnels_active{namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            }
          }
        },
        {
          "title": "Port Allocations",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 1 },
          "targets": [
            {
              "expr": "tunnel_operator_port_allocations_active",
              "legendFormat": "Allocated"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 40000 },
                  { "color": "red", "value": 49000 }
                ]
              }
            }
          }
        },
        {
          "title": "Tunnels by Phase",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "targets": [
            {
              "expr": "sum by (phase) (tunnel_operator_tunnels_active{namespace=~\"$namespace\"})",
              "legendFormat": "{{ "{{" }}phase{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          }
        },
        {
          "title": "Reconciliation Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "targets": [
            {
              "expr": "sum by (result) (rate(tunnel_operator_reconciliations_total[5m]))",
              "legendFormat": "{{ "{{" }}result{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "fillOpacity": 10 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "error" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              }
            ]
          }
        },
        {
          "title": "Forwarder",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "collapsed": false
        },
        {
          "title": "Active UDP Sessions",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(tunnel_forwarder_active_sessions{tunnel_namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Total"
            },
            {
              "expr": "sum by (tunnel_name) (tunnel_forwarder_active_sessions{tunnel_namespace=~\"$namespace\"})",
              "legendFormat": "{{ "{{" }}tunnel_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Forwarder Packet Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 8 },
          "targets": [
            {
              "expr": "sum by (direction) (rate(tunnel_forwarder_packets_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ "{{" }}direction{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Forwarder Throughput",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 8 },
          "targets": [
            {
              "expr": "sum by (direction) (rate(tunnel_forwarder_bytes_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ "{{" }}direction{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Gateway",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
          "collapsed": false
        },
        {
          "title": "Active TCP Connections",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(tunnel_gateway_tcp_connections_active{tunnel_namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Total"
            },
            {
              "expr": "sum by (tunnel_name, target_host) (tunnel_gateway_tcp_connections_active{tunnel_namespace=~\"$namespace\"})",
              "legendFormat": "{{ "{{" }}tunnel_name{{ "}}" }} → {{ "{{" }}target_host{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "TCP Connection Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(tunnel_gateway_tcp_connections_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "Total"
            },
            {
              "expr": "sum by (tunnel_name, target_host) (rate(tunnel_gateway_tcp_connections_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ "{{" }}tunnel_name{{ "}}" }} → {{ "{{" }}target_host{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Gateway TCP Throughput",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(tunnel_gateway_tcp_received_bytes_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "Client → Target"
            },
            {
              "expr": "sum(rate(tunnel_gateway_tcp_sent_bytes_total{tunnel_namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "Target → Client"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        }
      ]
    }
{{- end }}
