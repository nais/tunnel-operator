environmentKinds:
  - tenant

values:
  replicaCount:
    displayName: Replica count
    description: Number of operator replicas to run
    config:
      type: int

  resources.requests.cpu:
    displayName: CPU request
    description: Expected amount of CPU the operator container needs
    config:
      type: string

  resources.requests.memory:
    displayName: Memory request
    description: Expected amount of memory the operator container needs
    config:
      type: string

  resources.limits.cpu:
    displayName: CPU limit
    description: Maximum amount of CPU the operator container can use
    config:
      type: string

  resources.limits.memory:
    displayName: Memory limit
    description: Maximum amount of memory the operator container can use
    config:
      type: string

  serviceAccount.email:
    displayName: GCP SA email
    description: GCP service account email for Workload Identity
    computed:
      template: |
        {{ .Env.tunnel_operator_name | quote }}

  apiServer.address:
    displayName: API server CIDR
    description: Kubernetes API server address as CIDR (e.g. 10.0.0.1/32)
    computed:
      template: |
        {{ .Env.apiserver_endpoint }}/32

  logLevel:
    displayName: Log level
    description: Log level for all components (debug, info, warn, error)
    config:
      type: string
      default: "info"

  gatewayDebug:
    displayName: Gateway debug mode
    description: Adds tcpdump (CAP_NET_RAW) to gateway pods for packet capture
    config:
      type: bool
      default: "false"
